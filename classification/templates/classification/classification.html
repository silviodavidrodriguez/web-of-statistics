{% extends "home/base_clean.html" %}
{% block stylesheets %}

<style>
.data-preview-wrapper {
    max-height: 300px;
    overflow: auto;
    border: 1px solid #ddd;
    border-radius: 6px;
    background: white;
}

.data-preview-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
}

.data-preview-table td,
.data-preview-table th {
    border: 1px solid #e5e5e5;
    padding: 4px 8px;
    white-space: nowrap;
}
.data-paste-area.has-preview {
    height: 45px !important;
    min-height: 45px !important;
    resize: none;
    overflow: hidden;
    color: transparent;
    caret-color: #333;
}

.data-paste-area.has-preview::selection {
    color: transparent;
    background: transparent;
}

.data-paste-area.has-preview::before {
    content: "Data pasted";
}
</style>
{% endblock stylesheets %}
{% block content %}

<div class="row" style="margin-top: 20px; margin-bottom: 5px;">
    <div class="col-md-12">
        <div class="card card-profile">
            <div class="card-body py-3">
                <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 8px; color: #333;">
                    Classification Tools
                </h1>
            </div>
        </div>
    </div>
</div>

{% endblock content %}
